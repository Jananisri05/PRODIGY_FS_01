<!DOCTYPE html>
<html>
<head>
<style>
body 
{
    font-family: Arial;
    background: #f5f5f5;
    padding: 40px;
    text-align: center;
}
.card 
{
    width: 350px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 6px;
    box-shadow: 0 0 10px #ccc;
}
button 
{
    padding: 10px 20px;
    background: #f44336;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 4px;
}
button:hover { background: #d32f2f; }
</style>
</head>

<body>
<div class="card">
    <h2>Dashboard</h2>
    <p>Logged in as: <b>{{ user.username }}</b></p>

    <form action="/logout/" method="GET">
        <button type="submit">Logout</button>
    </form>
</div>
</body>
</html>
